<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>wcinamtools :3</title>
  <meta name="description" content="meow" />
  <link rel="icon" href="assets/wicinamobrys.ico" type="image/x-icon">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
<main class="wrap container">
  <section class="hero hero-main">
    <img src="assets/wcinamwcinam.png" alt="wcinamkabel's tools" class="hero-logo">
    <p>Fast, minimal tools for MTG — pick one below.</p>

    <div class="tools-grid">
      <a href="tools/wcinamkonwerter.html" class="tool-button">
        <span class="tool-name">wcinamkonwerter</span>
        <span class="tool-tagline">Moxfield to Archidekt decklist converter</span>
      </a>
      <a href="tools/bulkranking.html" class="tool-button">
        <span class="tool-name">bulkanalyser</span>
        <span class="tool-tagline">Tool for analyzing bulk card data</span>
      </a>
    </div>
  </section>
</main>

  <footer class="site-footer">
    <div class="container foot-inner">
      <a href="https://github.com/wcinamkabel/wcinamkabel.github.io">Made with ❤️ by abel</a>
    </div>
  </footer>

<script>
  // Smooth interaction handling
  const toolButtons = document.querySelectorAll('.tool-button');
  toolButtons.forEach(btn => {
    btn.addEventListener('mousedown', e => btn.classList.add('active'));
    btn.addEventListener('mouseup', () => btn.classList.remove('active'));
    btn.addEventListener('mouseleave', () => btn.classList.remove('active'));
  });
</script>
<script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
  <script src="assets/scroll.js"></script> 
</body>
</html>
